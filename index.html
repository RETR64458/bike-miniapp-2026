<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bike Balance</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      text-align: center;
      font-size: 18px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #4f7cff;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day {
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      background: #2a2a2a;
    }

    .active { background: #2ecc71; }
    .due { background: #3498db; }
    .expired { background: #e74c3c; }

    .legend {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚲 Bike Balance</h1>

    <div class="card">
      💰 Баланс: <b id="balance">0</b> zł
    </div>

    <div class="controls">
      <input id="input" placeholder="Сума" />
      <button onclick="addBalance()">Поповнити</button>
    </div>

    <div class="calendar" id="calendar"></div>

    <div class="legend">
      <span>🟢 оплачено</span>
      <span>🔵 сьогодні</span>
      <span>🔴 нема</span>
    </div>
  </div>

<script>
  const DAILY_COST = 30;

  let balance = Number(localStorage.getItem("balance")) || 0;

  function save() {
    localStorage.setItem("balance", balance);
  }

  function addBalance() {
    const input = document.getElementById("input");
    balance += Number(input.value || 0);
    input.value = "";
    save();
    render();
  }

  function render() {
    document.getElementById("balance").innerText = balance;

    const daysCovered = Math.floor(balance / DAILY_COST);

    const calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    const today = new Date();

    for (let i = 0; i < 30; i++) {
      const day = document.createElement("div");
      day.classList.add("day");

      let status = "";

      if (i < daysCovered) status = "active";
      else if (i === daysCovered) status = "due";
      else status = "expired";

      day.classList.add(status);

      const date = new Date();
      date.setDate(today.getDate() + i);

      day.innerText = date.getDate();

      calendar.appendChild(day);
    }
  }

  if (window.Telegram?.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }

  render();
</script>
</body>
</html>
